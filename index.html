<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }

#app { display: flex; width: 100%; height: 100%; user-select: none; }

/* ── Canvas ── */
#canvas {
  flex: 1; display: block; outline: none; cursor: default;
  background: #2C2F3A; min-height: 0;
}
#main {
  flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0;
}

/* ── Tab Bar ── */
#tab-bar {
  height: 36px; flex-shrink: 0;
  background: rgba(19, 16, 58, 0.92);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid rgba(255,255,255,0.055);
  display: flex; align-items: center;
  padding: 0 6px; gap: 3px;
  overflow-x: auto; overflow-y: hidden;
}
#tab-bar::-webkit-scrollbar { height: 3px; }
#tab-bar::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.3); border-radius: 2px; }
.map-tab {
  height: 26px; padding: 0 10px;
  border-radius: 6px; border: 1px solid transparent;
  background: transparent; color: rgba(255,255,255,0.28);
  cursor: pointer; font-size: 12px; font-family: system-ui, sans-serif; letter-spacing: 0.01em;
  white-space: nowrap; display: flex; align-items: center; gap: 5px;
  transition: background .15s, color .15s; flex-shrink: 0; outline: none;
}
.map-tab:hover { background: rgba(255,255,255,0.055); color: rgba(255,255,255,0.6); }
.map-tab.active {
  background: rgba(139, 92, 246, 0.16); color: #c4b5fd;
  border-color: rgba(139, 92, 246, 0.38);
  box-shadow: 0 0 12px rgba(139,92,246,0.15);
}
.map-tab-close {
  font-size: 13px; line-height: 1; opacity: 0; color: rgba(255,255,255,0.4);
  transition: opacity .12s, color .12s; padding: 0 1px;
}
.map-tab:hover .map-tab-close { opacity: 1; }
.map-tab-close:hover { color: #f87171 !important; }
.map-tab-rename {
  background: rgba(139,92,246,0.12); border: 1px solid rgba(139,92,246,0.5);
  color: #e2e0ff; border-radius: 4px; padding: 1px 5px;
  font-size: 12px; font-family: system-ui, sans-serif;
  outline: none; min-width: 40px; max-width: 160px; width: 80px;
}
.map-tab-add {
  width: 26px; height: 26px; border-radius: 6px; flex-shrink: 0;
  background: transparent; border: 1px solid transparent;
  color: rgba(255,255,255,0.28); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: background .15s, color .15s; outline: none; padding: 0;
}
.map-tab-add:hover { background: rgba(255,255,255,0.055); color: #c4b5fd; border-color: rgba(255,255,255,0.08); }

/* ── Toolbar ── */

.swatch {

.node-label {

<script>
'use strict';

// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const PALETTE = ['#130d21','#B8A7F0','#86C8D5','#90CBB7','#E7BF84','#E7A98A','#DF9DB6','#CFD8E7'];
const BACKGROUND_THEMES = [
  { id:'midnight', name:'Midnight', canvas:'#2C2F3A', dot:'rgba(255,255,255,0.055)', preview:'linear-gradient(135deg,#2c2f3a,#222530)' },
  { id:'ink', name:'Ink', canvas:'#101522', dot:'rgba(200,220,255,0.08)', preview:'linear-gradient(135deg,#0d111b,#1a2340)' },
  { id:'blush-night', name:'Blush Night', canvas:'#2a2134', dot:'rgba(255,210,236,0.1)', preview:'linear-gradient(135deg,#2a2134,#49345c)' },
  { id:'hot-pink', name:'Hot Pink', canvas:'#3b0f2d', dot:'rgba(255,170,225,0.15)', preview:'linear-gradient(135deg,#3b0f2d,#7a1f58)' },
  { id:'petal-cloud', name:'Petal Cloud', canvas:'#FF52A3', dot:'rgba(92,15,54,0.2)', preview:'linear-gradient(135deg,#ff52a3,#c92d7b)' },
  { id:'dusk', name:'Dusk', canvas:'#1a1730', dot:'rgba(206,189,255,0.08)', preview:'linear-gradient(135deg,#1a1730,#2d2553)' },
  { id:'slate', name:'Slate', canvas:'#1f252d', dot:'rgba(220,230,242,0.08)', preview:'linear-gradient(135deg,#1f252d,#2f3741)' },
  { id:'paper', name:'Paper', canvas:'#f2f4f8', dot:'rgba(15,23,42,0.14)', preview:'linear-gradient(135deg,#f2f4f8,#dde3ee)' }
];
const DEFAULT_SIZE = { rect:[160,80], circle:[100,100], diamond:[120,100], text:[160,44], image:[200,150] };
const MIN_ZOOM = 0.08, MAX_ZOOM = 5, ZOOM_F = 0.11;
const SNAP_DIST = 18; // screen px for anchor snap
const LS_KEY = 'brainmap_v4';
const ANCHOR_NAMES = ['N','NE','E','SE','S','SW','W','NW'];
const NS = 'http://www.w3.org/2000/svg';
const TOOL_CURSORS = {
  select:'default', rect:'crosshair', circle:'crosshair', diamond:'crosshair',
  text:'text', arrow:'crosshair', curve:'crosshair', image:'crosshair'
};

// ═══════════════════════════════════════════
// IMAGE STORE  (IndexedDB — keeps base64 out of localStorage & history)
// ═══════════════════════════════════════════
const imageCache = new Map(); // imageId → dataUrl  (always in-memory)
let _imgDB = null;

function _openImageDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('brainmap_images', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('images', { keyPath: 'id' });
    req.onsuccess  = e => { _imgDB = e.target.result; resolve(); };
    req.onerror    = () => reject(req.error);
  });
}

function _loadAllImages() {
  if (!_imgDB) return Promise.resolve();
  return new Promise(resolve => {
    const req = _imgDB.transaction('images', 'readonly').objectStore('images').getAll();
    req.onsuccess = () => { for (const r of req.result) imageCache.set(r.id, r.src); resolve(); };
    req.onerror   = () => resolve();
  });
}

function storeImage(imageId, dataUrl) {
  imageCache.set(imageId, dataUrl);
  if (!_imgDB) return;
  _imgDB.transaction('images', 'readwrite').objectStore('images').put({ id: imageId, src: dataUrl });
}

function deleteImage(imageId) {
  imageCache.delete(imageId);
  if (!_imgDB) return;
  _imgDB.transaction('images', 'readwrite').objectStore('images').delete(imageId);
}

function generateImageId() {
  return 'img_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
}

// Migrate old nodes that still carry a raw base64 src → move to imageCache + IndexedDB
function migrateImageNodes() {
  const allMaps = maps.length ? maps : [];
  for (const m of allMaps) {
    for (const n of (m.nodes || [])) {
      if (n.type === 'image' && n.src && !n.imageId) {
        n.imageId = generateImageId();
        storeImage(n.imageId, n.src);
        delete n.src;
      }
    }
  }
  // also handle currently-loaded nodes array
  for (const n of nodes) {
    if (n.type === 'image' && n.src && !n.imageId) {
      n.imageId = generateImageId();
      storeImage(n.imageId, n.src);
      delete n.src;
    }
  }
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let nodes = [];
let edges = [];
let vp = { x: 0, y: 0, s: 1 };
let selection = new Set();
let activeTool = 'select';
let activeFill = '#130d21';
let activeThemeId = 'midnight';
let history = [];
let future  = [];
let idCtr = 1;
const _nodeRenderCache = new Map(); // nodeId → hash — skip re-render when unchanged
const _edgeRenderCache = new Map(); // edgeId → hash
function uid() { return 'id' + (idCtr++); }

// Multi-map state
let maps = [];
let activeMapId = null;
let mapIdCtr = 1;
function mapUid() { return 'map' + (mapIdCtr++); }
function currentMap() { return maps.find(m => m.id === activeMapId); }

// Interaction state
const ix = {
  mode: 'idle', // 'pan'|'move-node'|'resize'|'draw-shape'|'draw-edge'|'rubber-band'|'move-cp'|'move-ep'
  startSX: 0, startSY: 0,   // screen start
  startWX: 0, startWY: 0,   // world start
  nodeId: null, edgeId: null,
  corner: null,   // resize corner
  epKey: null,    // 'x1'/'x2' for edge endpoint move
  origNode: null, // snapshot before resize
  multiSnap: [],  // [{id, ox, oy}] for multi-node drag
  preview: null,  // SVG element
  edgeFromId: null, edgeFromAnchor: null,
  edgeX1: 0, edgeY1: 0,
  snapTarget: null, // {nodeId, anchor} while drawing edge
};

// ═══════════════════════════════════════════
// COORDINATE UTILS
// ═══════════════════════════════════════════
const canvas = document.getElementById('canvas');
const layerNodesEl = document.getElementById('layer-nodes');
const layerEdgesEl = document.getElementById('layer-edges');
const layerOverlayEl = document.getElementById('layer-overlay');
const vpEl = document.getElementById('vp');
const dotPatternEl = document.getElementById('dotpat');
const dotPatternCircleEl = document.getElementById('dotpat-circle');
const sbToolEl = document.getElementById('sb-tool');
const sbZoomEl = document.getElementById('sb-zoom');
const sbSelEl = document.getElementById('sb-sel');

function deepClone(value) {
  return JSON.parse(JSON.stringify(value));
}

function getBackgroundThemeById(themeId) {
  return BACKGROUND_THEMES.find(t => t.id === themeId) || BACKGROUND_THEMES[0];
}

function applyBackgroundTheme(themeId, skipSave=false) {
  const theme = getBackgroundThemeById(themeId);
  activeThemeId = theme.id;
  canvas.style.background = theme.canvas;
  dotPatternCircleEl?.setAttribute('fill', theme.dot);
  document.querySelectorAll('.bg-swatch').forEach(s => s.classList.remove('active'));
  document.querySelector(`.bg-swatch[data-theme="${theme.id}"]`)?.classList.add('active');
  if (!skipSave) scheduleSave();
}

function svgRect() { return canvas.getBoundingClientRect(); }

function screenToWorld(sx, sy) {
  return { x: (sx - vp.x) / vp.s, y: (sy - vp.y) / vp.s };
}
function worldToScreen(wx, wy) {
  return { x: wx * vp.s + vp.x, y: wy * vp.s + vp.y };
}
function eventToScreen(e) {
  const r = svgRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}
function eventToWorld(e) {
  const s = eventToScreen(e);
  return screenToWorld(s.x, s.y);
}

// Viewport center in world coords
function viewCenter() {
  const r = svgRect();
  return screenToWorld(r.width / 2, r.height / 2);
}

// ═══════════════════════════════════════════
// NODE ANCHORS
// ═══════════════════════════════════════════
function nodeAnchors(node) {
  const { x, y, w, h } = node;
  return {
    N: { x: x + w/2, y },
    NE: { x: x + w,  y },
    E: { x: x + w,   y: y + h/2 },
    SE: { x: x + w,  y: y + h },
    S: { x: x + w/2, y: y + h },
    SW: { x,         y: y + h },
    W: { x,           y: y + h/2 },
    NW: { x,         y },
  };
}

function anchorPos(nodeId, anchor) {
  const n = nodes.find(n => n.id === nodeId);
  if (!n) return null;
  return nodeAnchors(n)[anchor] || null;
}

function nearestAnchor(node, wx, wy) {
  const anchors = nodeAnchors(node);
  let best = null, bestD = Infinity;
  for (const [name, pt] of Object.entries(anchors)) {
    const d = Math.hypot(pt.x - wx, pt.y - wy);
    if (d < bestD) { bestD = d; best = { name, ...pt }; }
  }
  return best;
}

// Find which node + anchor is closest to screen point, within SNAP_DIST
function findSnapAnchor(sx, sy, excludeNodeId) {
  let best = null, bestD = Infinity;
  for (const node of nodes) {
    if (node.id === excludeNodeId) continue;
    const anchors = nodeAnchors(node);
    for (const [name, pt] of Object.entries(anchors)) {
      const sp = worldToScreen(pt.x, pt.y);
      const d = Math.hypot(sp.x - sx, sp.y - sy);
      if (d < SNAP_DIST && d < bestD) {
        bestD = d;
        best = { nodeId: node.id, anchor: name, wx: pt.x, wy: pt.y };
      }
    }
  }
  return best;
}

// ═══════════════════════════════════════════
// EDGE ENDPOINTS
// ═══════════════════════════════════════════
function resolveEdge(edge) {
  let x1 = edge.x1, y1 = edge.y1, x2 = edge.x2, y2 = edge.y2;
  if (edge.fromId) { const p = anchorPos(edge.fromId, edge.fromAnchor); if (p) { x1=p.x; y1=p.y; } }
  if (edge.toId)   { const p = anchorPos(edge.toId,   edge.toAnchor);   if (p) { x2=p.x; y2=p.y; } }
  return { x1, y1, x2, y2 };
}

function defaultCurveCP(x1, y1, x2, y2) {
  const mx = (x1+x2)/2, my = (y1+y2)/2;
  const dx = x2-x1, dy = y2-y1;
  const len = Math.hypot(dx,dy) || 1;
  return { cx: mx - (dy/len)*50, cy: my + (dx/len)*50 };
}

// ═══════════════════════════════════════════
// SVG HELPERS
// ═══════════════════════════════════════════
function el(tag, attrs={}) {
  const e = document.createElementNS(NS, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}

function setAttrs(e, attrs) {
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
}

function isLightHexColor(color) {
  if (!color || typeof color !== 'string' || color[0] !== '#') return false;
  let hex = color.slice(1);
  if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
  if (hex.length !== 6) return false;
  const r = parseInt(hex.slice(0, 2), 16);
  const g = parseInt(hex.slice(2, 4), 16);
  const b = parseInt(hex.slice(4, 6), 16);
  if ([r, g, b].some(n => Number.isNaN(n))) return false;
  const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
  return luminance > 0.72;
}

function labelColorForNode(node) {
  if (node.type === 'text') return '#1E293B';
  return isLightHexColor(node.fill) ? '#0f172a' : 'rgba(255,255,255,0.9)';
}

function hintColorForNode(node) {
  if (node.type === 'text') return 'rgba(30,41,59,0.42)';
  return isLightHexColor(node.fill) ? 'rgba(15,23,42,0.4)' : 'rgba(255,255,255,0.22)';
}


// ═══════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════
function snapshot() {
  return { nodes: deepClone(nodes), edges: deepClone(edges) };
}

function pushHistory() {
  history.push(snapshot());
  if (history.length > 80) history.shift();
  future = [];
}

function applySnapshot(s) {
  nodes = s.nodes; edges = s.edges;
  idCtr = Math.max(idCtr, ...nodes.map(n=>parseInt(n.id.slice(2))+1), ...edges.map(e=>parseInt(e.id.slice(2))+1), 1);
  selection.clear();
  _nodeRenderCache.clear();
  _edgeRenderCache.clear();
  if (layerNodesEl) layerNodesEl.innerHTML = '';
  if (layerEdgesEl) layerEdgesEl.innerHTML = '';
  render();
}

function undo() {
  if (!history.length) return;
  future.push(snapshot());
  applySnapshot(history.pop());
}

function redo() {
  if (!future.length) return;
  history.push(snapshot());
  applySnapshot(future.pop());
}

// ═══════════════════════════════════════════
// MULTI-MAP
// ═══════════════════════════════════════════
function saveCurrentMap() {
  const m = currentMap();
  if (!m) return;
  m.nodes = deepClone(nodes);
  m.edges = deepClone(edges);
  m.vp = { ...vp };
}

function loadMapData(m) {
  nodes = deepClone(m.nodes || []);
  edges = deepClone(m.edges || []);
  // Ensure text nodes always have a stable default fill.
  for (const n of nodes) {
    if (n.type === 'text' && (!n.fill || n.fill === '#4d7ef7' || n.fill === '#9FAAF3')) n.fill = '#130d21';
  }
  // Migrate older default edge colors to the current default (white)
  for (const e of edges) {
    if (!e.color || e.color === '#3a4a6a' || e.color === '#22283a') e.color = '#ffffff';
  }
  vp = m.vp ? { ...m.vp } : { x: 0, y: 0, s: 1 };
  history = []; future = [];
  idCtr = Math.max(1,
    ...nodes.map(n => parseInt(n.id.slice(2)) + 1),
    ...edges.map(e => parseInt(e.id.slice(2)) + 1)
  );
  selection.clear();
  if (layerNodesEl) layerNodesEl.innerHTML = '';
  if (layerEdgesEl) layerEdgesEl.innerHTML = '';
}

function switchMap(id) {
  if (id === activeMapId) return;
  closeTextEditor(false);
  saveCurrentMap();
  activeMapId = id;
  loadMapData(currentMap());
  render();
  renderTabs();
  scheduleSave();
}

function addMap(name) {
  saveCurrentMap();
  const id = mapUid();
  const m = { id, name: name || 'Map ' + (maps.length + 1), nodes: [], edges: [], vp: { x: 0, y: 0, s: 1 } };
  maps.push(m);
  activeMapId = id;
  loadMapData(m);
  render();
  renderTabs();
  scheduleSave();
  // Scroll new tab into view
  setTimeout(() => {
    const tab = document.querySelector('.map-tab.active');
    tab?.scrollIntoView({ inline: 'nearest' });
  }, 50);
}

function deleteMap(id) {
  if (maps.length <= 1) return;
  const idx = maps.findIndex(m => m.id === id);
  if (idx === -1) return;
  maps.splice(idx, 1);
  if (activeMapId === id) {
    const newIdx = Math.min(idx, maps.length - 1);
    activeMapId = maps[newIdx].id;
    loadMapData(currentMap());
    render();
  }
  renderTabs();
  scheduleSave();
}

function renameMap(id, name) {
  const m = maps.find(m => m.id === id);
  if (m && name.trim()) { m.name = name.trim(); renderTabs(); scheduleSave(); }
}

function renderTabs() {
  const bar = document.getElementById('tab-bar');
  if (!bar) return;
  bar.innerHTML = '';
  for (const m of maps) {
    const tab = document.createElement('button');
    tab.className = 'map-tab' + (m.id === activeMapId ? ' active' : '');
    tab.setAttribute('data-mapid', m.id);

    const nameSpan = document.createElement('span');
    nameSpan.className = 'map-tab-name';
    nameSpan.textContent = m.name;
    tab.appendChild(nameSpan);

    if (maps.length > 1) {
      const closeBtn = document.createElement('span');
      closeBtn.className = 'map-tab-close';
      closeBtn.textContent = '×';
      closeBtn.title = 'Delete map';
      closeBtn.addEventListener('click', e => {
        e.stopPropagation();
        if (confirm('Delete "' + m.name + '"?')) deleteMap(m.id);
      });
      tab.appendChild(closeBtn);
    }

    tab.addEventListener('click', () => switchMap(m.id));
    tab.addEventListener('dblclick', e => { e.stopPropagation(); startRenameTab(m.id, nameSpan); });
    bar.appendChild(tab);
  }

  const addBtn = document.createElement('button');
  addBtn.className = 'map-tab-add';
  addBtn.title = 'New map (Ctrl+Shift+N)';
  addBtn.textContent = '+';
  addBtn.addEventListener('click', () => addMap());
  bar.appendChild(addBtn);
}

function startRenameTab(mapId, nameSpan) {
  const oldName = nameSpan.textContent;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = oldName;
  input.className = 'map-tab-rename';
  nameSpan.replaceWith(input);
  input.focus(); input.select();
  const commit = () => { const n = input.value.trim() || oldName; renameMap(mapId, n); };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    e.stopPropagation();
    if (e.key === 'Enter') input.blur();
    else if (e.key === 'Escape') { input.value = oldName; input.blur(); }
  });
}

// ═══════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════
let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    saveCurrentMap();
    try { localStorage.setItem(LS_KEY, JSON.stringify({ maps, activeMapId, mapIdCtr, activeThemeId })); } catch(e) {}
  }, 1500);
}

function loadFromStorage() {
  try {
    // Try new multi-map format
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (d.maps && d.maps.length) {
        maps = d.maps;
        mapIdCtr = d.mapIdCtr || maps.length + 1;
        activeMapId = d.activeMapId || maps[0].id;
        activeThemeId = d.activeThemeId || activeThemeId;
        if (!currentMap()) activeMapId = maps[0].id;
        try { loadMapData(currentMap()); } catch(e) { console.error("Could not load inner nodes", e); }
        applyBackgroundTheme(activeThemeId, true);
        return true;
      } else if (d.nodes || d.edges) {
        // Migration for legacy v4 data stored as {nodes, edges, vp}
        const initialMapId = 'map1';
        maps = [{
          id: initialMapId,
          name: 'Map 1',
          nodes: d.nodes || [],
          edges: d.edges || [],
          vp: d.vp || { x:0, y:0, s:1 }
        }];
        mapIdCtr = 2;
        activeMapId = initialMapId;
        activeThemeId = d.activeThemeId || activeThemeId;
        try { loadMapData(maps[0]); } catch(e) { console.error("Migrate error", e); }
        applyBackgroundTheme(activeThemeId, true);
        return true;
      }
    }
    // Migrate old single-map format (brainmap_v3)
    const oldRaw = localStorage.getItem('brainmap_v3');
    if (oldRaw) {
      const d = JSON.parse(oldRaw);
      const m = { id: 'map1', name: 'Map 1', nodes: d.nodes || [], edges: d.edges || [], vp: d.vp || { x:0,y:0,s:1 } };
      maps = [m]; mapIdCtr = 2; activeMapId = 'map1';
      try { loadMapData(m); } catch(e) { console.error("Migrate error", e); }
      applyBackgroundTheme(activeThemeId, true);
      return true;
    }
    return false;
  } catch(e) { return false; }
}

// ═══════════════════════════════════════════
// RENDERER
// ═══════════════════════════════════════════

function renderNode(node) {
  const layer = layerNodesEl;
  if (!layer) return;
  // Hash-based dirty check — skip if nothing that affects appearance has changed
  const _isSel = selection.has(node.id);
  const _hash = `${node.x},${node.y},${node.w},${node.h},${node.type},${node.fill||''},${node.text||''},${node.fontSize||''},${node.bold?1:0},${node.italic?1:0},${node.imageId||''},${node.noBorder?1:0},${_isSel?1:0}`;
  const _existingEl = document.getElementById('n-' + node.id);
  if (_existingEl && _nodeRenderCache.get(node.id) === _hash) return;
  _nodeRenderCache.set(node.id, _hash);
  let g = _existingEl;
  if (!g) {
    g = el('g', { id: 'n-'+node.id, class: 'node-group', 'data-id': node.id });
    layer.appendChild(g);
  }
  g.innerHTML = '';
  const { type, x, y, w, h, text='' } = node;
  const fill = node.fill ?? (type === 'text' ? '#130d21' : '#4d7ef7');
  const isSel = _isSel;
  const labelColor = labelColorForNode(node);
  const hintColor = hintColorForNode(node);

  // Main shape
  let shape;
  if (type === 'rect' || type === 'text') {
    shape = el('rect', { class:'node-shape', x, y, width:w, height:h, rx: type==='rect'?10:5,
      fill,
      stroke: '#ffffff' });
  } else if (type === 'circle') {
    shape = el('ellipse', { class:'node-shape', cx:x+w/2, cy:y+h/2, rx:w/2, ry:h/2,
      fill, stroke:'#ffffff' });
  } else if (type === 'diamond') {
    const pts = `${x+w/2},${y} ${x+w},${y+h/2} ${x+w/2},${y+h} ${x},${y+h/2}`;
    shape = el('polygon', { class:'node-shape', points:pts, fill, stroke:'#ffffff' });
  } else if (type === 'image') {
    const defs = el('defs');
    const clip = el('clipPath', { id:'clip-'+node.id });
    clip.appendChild(el('rect', { x, y, width:w, height:h, rx:8 }));
    defs.appendChild(clip);
    g.appendChild(defs);
    shape = el('image', { href: node.src || imageCache.get(node.imageId) || '', x, y, width:w, height:h,
      preserveAspectRatio:'xMidYMid meet', 'clip-path':'url(#clip-'+node.id+')' });
  }
  g.appendChild(shape);

  if (type === 'image' && !node.noBorder) {
    g.appendChild(el('rect', {
      x, y, width:w, height:h, rx:8,
      fill:'none',
      stroke:'#ffffff',
      'stroke-width':2,
      'pointer-events':'none'
    }));
  }

  // Text label
  if (type !== 'image' && (text || !isSel)) {
    const fs = node.fontSize || 14;
    const fw = node.bold ? 'bold' : 'normal';
    const fSt = node.italic ? 'italic' : 'normal';
    
    const fo = el('foreignObject', { x, y, width:w, height:h, style:'pointer-events:none;' });
    
    // Create an HTML div for text
    const div = document.createElement('div');
    div.style.cssText = `
      width: 100%; height: 100%;
      display: block;
      text-align: left;
      font-size: ${fs}px; font-weight: ${fw}; font-style: ${fSt};
      color: ${labelColor};
      font-family: system-ui, -apple-system, sans-serif;
      box-sizing: border-box; padding: 4px;
      word-break: break-word; white-space: pre-wrap;
      pointer-events: none;
    `;
    if (text) {
      div.innerHTML = text; // Now supports rich text HTML tags
    } else if (!isSel) {
      div.style.color = hintColor;
      div.style.fontSize = '11px';
      div.innerText = 'double-click to edit';
    }
    fo.appendChild(div);
    g.appendChild(fo);
  }

  // Anchor dots (shown via CSS on hover in arrow tools)
  const anchors = nodeAnchors(node);
  for (const pt of Object.values(anchors)) {
    g.appendChild(el('circle', { class:'anchor-dot', cx:pt.x, cy:pt.y, r:5 }));
  }

  // Selection visuals
  if (isSel) {
    const pad = 5;
    if (type === 'circle') {
      g.appendChild(el('ellipse', { class:'sel-ring', cx:x+w/2, cy:y+h/2, rx:w/2+pad, ry:h/2+pad }));
    } else if (type === 'diamond') {
      g.appendChild(el('polygon', { class:'sel-ring',
        points:`${x+w/2},${y-pad} ${x+w+pad},${y+h/2} ${x+w/2},${y+h+pad} ${x-pad},${y+h/2}` }));
    } else {
      g.appendChild(el('rect', { class:'sel-ring', x:x-pad, y:y-pad, width:w+pad*2, height:h+pad*2, rx:type==='rect'?11:6 }));
    }
    // Resize handles (4 corners)
    const corners = [
      { cx:x,   cy:y,   name:'nw', cursor:'nw-resize' },
      { cx:x+w, cy:y,   name:'ne', cursor:'ne-resize' },
      { cx:x+w, cy:y+h, name:'se', cursor:'se-resize' },
      { cx:x,   cy:y+h, name:'sw', cursor:'sw-resize' },
    ];
    for (const c of corners) {
      g.appendChild(el('circle', { class:'resize-handle', cx:c.cx, cy:c.cy, r:5,
        style:`cursor:${c.cursor}`, 'data-corner':c.name, 'data-nid':node.id }));
    }
  }
}

function renderEdge(edge) {
  const layer = layerEdgesEl;
  if (!layer) return;
  // Hash-based dirty check for edges
  const _isSel = selection.has(edge.id);
  const _r = resolveEdge(edge);
  const _hash = `${_r.x1},${_r.y1},${_r.x2},${_r.y2},${edge.cx??''},${edge.cy??''},${edge.type},${edge.color||''},${edge.strokeWidth??''},${_isSel?1:0}`;
  const _existingEl = document.getElementById('e-' + edge.id);
  if (_existingEl && _edgeRenderCache.get(edge.id) === _hash) return;
  _edgeRenderCache.set(edge.id, _hash);
  let g = _existingEl;
  if (!g) {
    g = el('g', { id:'e-'+edge.id, class:'edge-group', 'data-id':edge.id });
    layer.appendChild(g);
  }
  g.innerHTML = '';
  const { x1, y1, x2, y2 } = _r;
  const stroke = edge.color || '#ffffff';
  const sw = edge.strokeWidth == null || edge.strokeWidth === 1.5 ? 2.8 : edge.strokeWidth;
  const marker = _isSel ? 'url(#ah-sel)' : 'url(#ah-def)';

  let d, cp = null;
  if (edge.type === 'straight') {
    d = `M ${x1},${y1} L ${x2},${y2}`;
  } else {
    if (edge.cx != null) { cp = { cx: edge.cx, cy: edge.cy }; }
    else { cp = defaultCurveCP(x1,y1,x2,y2); }
    d = `M ${x1},${y1} Q ${cp.cx},${cp.cy} ${x2},${y2}`;
  }

  // Invisible hit area
  g.appendChild(el('path', { class:'edge-hit', d }));
  // Visible path
  g.appendChild(el('path', { class:'edge-vis', d, stroke, 'stroke-width':sw,
    'marker-end':marker, 'stroke-opacity': _isSel?1:0.75 }));

  // Control-point handle for selected curves
  if (edge.type === 'curved' && _isSel && cp) {
    g.appendChild(el('line', { class:'edge-ctrl-line', x1, y1, x2:cp.cx, y2:cp.cy }));
    g.appendChild(el('line', { class:'edge-ctrl-line', x1:x2, y1:y2, x2:cp.cx, y2:cp.cy }));
    g.appendChild(el('circle', { class:'edge-ctrl-handle', cx:cp.cx, cy:cp.cy, r:6, 'data-eid':edge.id }));
  }

  // Endpoint drag handles when selected
  if (_isSel) {
    g.appendChild(el('circle', { class:'edge-ctrl-handle', cx:x1, cy:y1, r:5, 'data-eid':edge.id, 'data-ep':'x1' }));
    g.appendChild(el('circle', { class:'edge-ctrl-handle', cx:x2, cy:y2, r:5, 'data-eid':edge.id, 'data-ep':'x2' }));
  }
}

function updateViewport() {
  vpEl?.setAttribute('transform', `translate(${vp.x},${vp.y}) scale(${vp.s})`);
  // Keep grid dots aligned with world grid - snap tile size to screen pixels
  const tileSize = Math.max(8, 24 * vp.s);
  const offX = ((vp.x % tileSize) + tileSize) % tileSize;
  const offY = ((vp.y % tileSize) + tileSize) % tileSize;
  if (dotPatternEl) {
    dotPatternEl.setAttribute('patternTransform', `translate(${offX},${offY})`);
    dotPatternEl.setAttribute('width', tileSize);
    dotPatternEl.setAttribute('height', tileSize);
  }
}

const TOOL_NAMES = { select:'Select', rect:'Rectangle', circle:'Circle', diamond:'Diamond', text:'Text', arrow:'Arrow', curve:'Curve', image:'Image' };

function updateStatusBar() {
  if (sbToolEl) sbToolEl.textContent = TOOL_NAMES[activeTool] || activeTool;
  if (sbZoomEl) sbZoomEl.textContent = Math.round(vp.s*100) + '%';
  const ss = selection.size;
  if (sbSelEl) sbSelEl.textContent = ss > 0 ? `${ss} selected` : '';
}

function render() {
  // Viewport bounds in world space (computed once, used for culling)
  const _svgR = svgRect();
  const _tl = screenToWorld(0, 0);
  const _br = screenToWorld(_svgR.width, _svgR.height);
  const _pad = 120 / Math.max(vp.s, 0.01); // world-space padding so nodes pop in before edge

  // Nodes — only re-render if in viewport (hash check inside skips unchanged ones)
  for (const n of nodes) {
    if (n.x + n.w >= _tl.x - _pad && n.x <= _br.x + _pad &&
        n.y + n.h >= _tl.y - _pad && n.y <= _br.y + _pad) {
      renderNode(n);
    }
    // off-screen: leave existing DOM element as-is (browser culls it from paint)
  }
  // Remove DOM elements for deleted nodes and clear their cache entries
  const nl = layerNodesEl;
  if (nl) {
    const validNodeIds = new Set(nodes.map(n => 'n-' + n.id));
    for (const c of [...nl.children]) {
      if (!validNodeIds.has(c.id)) {
        c.remove();
        _nodeRenderCache.delete(c.id.slice(2)); // strip 'n-' prefix
      }
    }
  }
  // Edges (typically far fewer — always render)
  for (const e of edges) renderEdge(e);
  const el2 = layerEdgesEl;
  if (el2) {
    const validEdgeIds = new Set(edges.map(e => 'e-' + e.id));
    for (const c of [...el2.children]) {
      if (!validEdgeIds.has(c.id)) {
        c.remove();
        _edgeRenderCache.delete(c.id.slice(2));
      }
    }
  }
  updateViewport();
  updateStatusBar();
}

function buildSelectionDragSnapshot() {
  ix.multiSnap = [];
  for (const id of selection) {
    const n = nodes.find(node => node.id === id);
    if (n) {
      ix.multiSnap.push({ type:'node', id:n.id, ox:n.x, oy:n.y });
      continue;
    }
    const ed = edges.find(edge => edge.id === id);
    if (!ed) continue;
    const r = resolveEdge(ed);
    ix.multiSnap.push({
      type:'edge', id:ed.id, ox1:r.x1, oy1:r.y1, ox2:r.x2, oy2:r.y2, ocx:ed.cx, ocy:ed.cy
    });
  }
}

// ═══════════════════════════════════════════
// CRUD HELPERS
// ═══════════════════════════════════════════
function addNode(type, x, y, w, h, extra={}) {
  const defaultFill = type === 'text' ? '#130d21' : activeFill;
  const resolvedFill = extra.fill ?? defaultFill;
  const node = { id:uid(), type, x, y, w, h, text:'', ...extra, fill:resolvedFill };
  nodes.push(node);
  renderNode(node);
  scheduleSave();
  return node;
}

function addEdge(type, x1, y1, x2, y2, fromId=null, fromAnchor=null, toId=null, toAnchor=null) {
  const edge = { id:uid(), type, x1, y1, x2, y2, fromId, fromAnchor, toId, toAnchor, color:'#ffffff', strokeWidth:2.8 };
  edges.push(edge);
  renderEdge(edge);
  scheduleSave();
  return edge;
}

function deleteSelected() {
  if (!selection.size) return;
  pushHistory();
  for (const id of selection) {
    const ni = nodes.findIndex(n => n.id===id);
    if (ni !== -1) {
      const _dn = nodes[ni];
      if (_dn.imageId) deleteImage(_dn.imageId);
      _nodeRenderCache.delete(id);
      nodes.splice(ni, 1);
      document.getElementById('n-'+id)?.remove();
      // Remove connected edges
      edges = edges.filter(e => {
        if (e.fromId===id || e.toId===id) {
          document.getElementById('e-'+e.id)?.remove();
          return false;
        }
        return true;
      });
    }
    const ei = edges.findIndex(e => e.id===id);
    if (ei !== -1) {
      edges.splice(ei, 1);
      document.getElementById('e-'+id)?.remove();
    }
  }
  selection.clear();
  render();
  scheduleSave();
}

function duplicateSelected() {
  if (!selection.size) return;
  pushHistory();
  const idMap = new Map();
  const newIds = [];
  for (const id of selection) {
    const node = nodes.find(n => n.id===id);
    if (node) {
      const copy = { ...node, id:uid(), x:node.x+20, y:node.y+20 };
      idMap.set(id, copy.id);
      nodes.push(copy);
      newIds.push(copy.id);
    }
  }
  selection.clear();
  for (const id of newIds) selection.add(id);
  render();
  scheduleSave();
}

function bringToFront() {
  for (const id of selection) {
    const i = nodes.findIndex(n => n.id===id);
    if (i !== -1) { const [n] = nodes.splice(i,1); nodes.push(n); }
  }
  render();
}

function sendToBack() {
  for (const id of selection) {
    const i = nodes.findIndex(n => n.id===id);
    if (i !== -1) { const [n] = nodes.splice(i,1); nodes.unshift(n); }
  }
  render();
}

// ═══════════════════════════════════════════
// TEXT EDITOR
// ═══════════════════════════════════════════
const textEditor = document.getElementById('text-editor');
const textWrap = document.getElementById('text-edit-wrap');
let editingId = null;

function openTextEditor(node) {
  editingId = node.id;
  const r = svgRect();
  const sp = worldToScreen(node.x, node.y);
  textWrap.style.left   = (r.left + sp.x) + 'px';
  textWrap.style.top    = (r.top  + sp.y) + 'px';
  textWrap.style.display = 'block';

  textEditor.style.width  = Math.max(60, node.w * vp.s) + 'px';
  textEditor.style.height = Math.max(24, node.h * vp.s) + 'px';
  textEditor.style.fontSize = ((node.fontSize||14) * vp.s) + 'px';
  textEditor.style.fontWeight = node.bold ? 'bold' : 'normal';
  textEditor.style.fontStyle = node.italic ? 'italic' : 'normal';
  
  document.getElementById('fmt-bold').style.background = node.bold ? 'rgba(255,255,255,0.2)' : 'none';
  document.getElementById('fmt-italic').style.background = node.italic ? 'rgba(255,255,255,0.2)' : 'none';

  textEditor.innerHTML = node.text || '';
  textEditor.focus();
  // Move cursor to end
  const range = document.createRange();
  const sel = window.getSelection();
  range.selectNodeContents(textEditor);
  range.collapse(false);
  sel.removeAllRanges();
  sel.addRange(range);
}

function normalizeEditorHTML(html) {
  // Chrome sometimes wraps lines in <div> elements in contenteditable.
  // Normalize these to <br> so line breaks render correctly everywhere.
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  let result = '';
  const children = Array.from(tmp.childNodes);
  for (let i = 0; i < children.length; i++) {
    const child = children[i];
    if (child.nodeName === 'DIV' || child.nodeName === 'P') {
      if (i > 0) result += '<br>';
      result += child.innerHTML;
    } else {
      result += child.nodeType === Node.TEXT_NODE ? child.textContent : child.outerHTML;
    }
  }
  return result;
}

function closeTextEditor(commit=true) {
  if (!editingId) return;
  if (commit) {
    pushHistory();
    const node = nodes.find(n => n.id===editingId);
    if (node) {
      node.text = normalizeEditorHTML(textEditor.innerHTML);
      if (node.type === 'text' && (!node.fill || node.fill === '#4d7ef7' || node.fill === '#9FAAF3')) {
        node.fill = '#130d21';
      }
      renderNode(node);
    }
    scheduleSave();
  }
  textWrap.style.display = 'none';
  editingId = null;
  canvas.focus();
}

document.getElementById('text-format-bar').addEventListener('mousedown', e => e.preventDefault());

document.getElementById('fmt-bold').addEventListener('click', e => {
  const node = nodes.find(n => n.id === editingId);
  if (!node) return;
  document.execCommand('bold', false, null);
});

document.getElementById('fmt-italic').addEventListener('click', e => {
  const node = nodes.find(n => n.id === editingId);
  if (!node) return;
  document.execCommand('italic', false, null);
});

document.getElementById('fmt-size-up').addEventListener('click', () => {
  const node = nodes.find(n => n.id === editingId);
  if (!node) return;
  
  const sel = window.getSelection();
  if (sel.rangeCount) {
    const el = document.createElement('span');
    el.style.fontSize = '120%';
    const range = sel.getRangeAt(0);
    // Since direct formatting size via execCommand is limited to 1-7,
    // we use a quick workaround of font size spans.
    if (!range.collapsed) {
      document.execCommand('fontSize', false, "7");
      let fontElements = document.getElementsByTagName("font");
      for (let i = 0; i < fontElements.length; ++i) {
        if (fontElements[i].size == "7") {
          fontElements[i].removeAttribute("size");
          fontElements[i].style.fontSize = "120%";
        }
      }
    } else {
      // If no text selected, fall back to global resize
      node.fontSize = (node.fontSize || 14) + 2;
      textEditor.style.fontSize = (node.fontSize * vp.s) + 'px';
      renderNode(node);
    }
  }
});

document.getElementById('fmt-size-down').addEventListener('click', () => {
  const node = nodes.find(n => n.id === editingId);
  if (!node) return;
  
  const sel = window.getSelection();
  if (sel.rangeCount) {
    const range = sel.getRangeAt(0);
    if (!range.collapsed) {
      document.execCommand('fontSize', false, "1");
      let fontElements = document.getElementsByTagName("font");
      for (let i = 0; i < fontElements.length; ++i) {
        if (fontElements[i].size == "1") {
          fontElements[i].removeAttribute("size");
          fontElements[i].style.fontSize = "80%";
        }
      }
    } else {
      // If no text selected, fall back to global resize
      node.fontSize = Math.max(8, (node.fontSize || 14) - 2);
      textEditor.style.fontSize = (node.fontSize * vp.s) + 'px';
      renderNode(node);
    }
  }
});

textEditor.addEventListener('blur', () => closeTextEditor(true));
textEditor.addEventListener('keydown', e => {
  e.stopPropagation();
  if (e.key === ' ') {
    const sel = window.getSelection();
    if (sel.rangeCount) {
      const range = sel.getRangeAt(0);
      if (range.collapsed && range.startContainer.nodeType === Node.TEXT_NODE) {
        const tn = range.startContainer;
        const offset = range.startOffset;
        if (offset > 0 && tn.textContent[offset - 1] === '*') {
          e.preventDefault();
          // Remove the *
          tn.textContent = tn.textContent.slice(0, offset - 1) + tn.textContent.slice(offset);
          // Position cursor where * was
          const r = document.createRange();
          r.setStart(tn, offset - 1);
          r.collapse(true);
          sel.removeAllRanges();
          sel.addRange(r);
          // If there's content before the *, put bullet on new line; otherwise inline
          const preRange = document.createRange();
          preRange.setStart(textEditor, 0);
          preRange.setEnd(tn, offset - 1);
          const before = preRange.toString().trim();
          document.execCommand('insertHTML', false, before.length ? '<br>• ' : '• ');
        }
      }
    }
  }
  if (e.key === 'Escape') { closeTextEditor(false); }
  else if (e.key === 'Enter') {
    e.preventDefault();
    document.execCommand('insertLineBreak');
  }
});
textEditor.addEventListener('paste', e => {
  // Paste as plain text, converting newlines to <br>
  e.preventDefault();
  const text = (e.originalEvent || e).clipboardData.getData('text/plain');
  const html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
  document.execCommand('insertHTML', false, html);
});
textEditor.addEventListener('input', () => {
  textEditor.style.height = 'auto';
  textEditor.style.height = Math.max(24, textEditor.scrollHeight) + 'px';
});

// ═══════════════════════════════════════════
// CONTEXT MENU
// ═══════════════════════════════════════════
const ctxMenu = document.getElementById('ctx-menu');

function showCtxMenu(cx, cy) {
  ctxMenu.style.display = 'block';
  ctxMenu.style.left = cx + 'px';
  ctxMenu.style.top  = cy + 'px';
  const r = ctxMenu.getBoundingClientRect();
  if (r.right  > window.innerWidth)  ctxMenu.style.left = (cx - r.width)  + 'px';
  if (r.bottom > window.innerHeight) ctxMenu.style.top  = (cy - r.height) + 'px';
}
function hideCtxMenu() { ctxMenu.style.display = 'none'; }

document.getElementById('ctx-delete').addEventListener('click', () => { deleteSelected(); hideCtxMenu(); });
document.getElementById('ctx-dup').addEventListener('click',    () => { duplicateSelected(); hideCtxMenu(); });
document.getElementById('ctx-front').addEventListener('click',  () => { bringToFront(); hideCtxMenu(); });
document.getElementById('ctx-back').addEventListener('click',   () => { sendToBack(); hideCtxMenu(); });

// ═══════════════════════════════════════════
// TOOL MANAGEMENT
// ═══════════════════════════════════════════
function setTool(t) {
  activeTool = t;
  document.querySelectorAll('.tb-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tool-'+t)?.classList.add('active');
  canvas.className = 'tool-' + t;
  canvas.style.cursor = t === 'select' ? 'grab' : (TOOL_CURSORS[t] || 'default');
  updateStatusBar();
}

function setFill(color) {
  activeFill = color;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  document.querySelector(`.swatch[data-color="${color}"]`)?.classList.add('active');
  // Apply to selected nodes
  for (const id of selection) {
    const n = nodes.find(n => n.id===id);
    if (n && n.type !== 'image') { n.fill = color; renderNode(n); }
  }
  scheduleSave();
}

// ═══════════════════════════════════════════
// MOUSE EVENTS
// ═══════════════════════════════════════════

canvas.addEventListener('pointerdown', e => {
  // Capture targets *before* closeTextEditor potentially replaces DOM elements
  const rh = e.target.closest('.resize-handle');
  const cph = e.target.closest('.edge-ctrl-handle');
  const ng = e.target.closest('.node-group');
  const eg = e.target.closest('.edge-group');

  if (editingId) {
    const _clickedNg = e.target.closest('.node-group');
    if (!_clickedNg || _clickedNg.getAttribute('data-id') !== editingId) closeTextEditor(true);
  }
  hideCtxMenu();

  // Middle mouse or Space+drag = pan
  if (e.button === 1 || (e.button === 0 && e.altKey)) {
    ix.mode = 'pan';
    ix.startSX = e.clientX - vp.x;
    ix.startSY = e.clientY - vp.y;
    canvas.style.cursor = 'grabbing';
    canvas.setPointerCapture(e.pointerId);
    e.preventDefault();
    return;
  }

  if (e.button !== 0) return;
  canvas.setPointerCapture(e.pointerId);

  const sp = eventToScreen(e);
  const wp = screenToWorld(sp.x, sp.y);

  // ── Resize handle ──
  if (rh && activeTool === 'select') {
    pushHistory();
    const nodeId = rh.getAttribute('data-nid');
    const corner = rh.getAttribute('data-corner');
    const node = nodes.find(n => n.id===nodeId);
    ix.mode = 'resize'; ix.nodeId = nodeId; ix.corner = corner;
    ix.origNode = {...node}; ix.startWX = wp.x; ix.startWY = wp.y;
    e.stopPropagation(); return;
  }

  // ── Edge control point ──
  if (cph && activeTool === 'select') {
    pushHistory();
    ix.edgeId = cph.getAttribute('data-eid');
    const ep = cph.getAttribute('data-ep');
    if (ep) { ix.mode = 'move-ep'; ix.epKey = ep; }
    else { ix.mode = 'move-cp'; }
    ix.startWX = wp.x; ix.startWY = wp.y;
    e.stopPropagation(); return;
  }

  // ── Node click ──
  if (ng) {
    const nodeId = ng.getAttribute('data-id');

    if (activeTool === 'select') {
      const wasSelected = selection.has(nodeId);
      if (e.shiftKey) {
        if (wasSelected) selection.delete(nodeId); else selection.add(nodeId);
      } else {
        if (!wasSelected) { selection.clear(); selection.add(nodeId); }
      }
      render();
      pushHistory();
      ix.mode = 'move-node'; ix.startWX = wp.x; ix.startWY = wp.y;
      ix.wasSelected = wasSelected;
      buildSelectionDragSnapshot();
      e.stopPropagation(); return;
    }

    // Arrow/curve tool: start from node anchor
    if (activeTool === 'arrow' || activeTool === 'curve') {
      const anch = nearestAnchor(nodes.find(n=>n.id===nodeId), wp.x, wp.y);
      const fromAnchor = anch?.name || 'E';
      const ap = anchorPos(nodeId, fromAnchor) || wp;
      ix.mode = 'draw-edge'; ix.edgeFromId = nodeId; ix.edgeFromAnchor = fromAnchor;
      ix.startSX = sp.x; ix.startSY = sp.y;
      ix.edgeX1 = ap.x; ix.edgeY1 = ap.y;
      ix.snapTarget = null;
      _startEdgePreview(ix.edgeX1, ix.edgeY1, ix.edgeX1, ix.edgeY1);
      e.stopPropagation(); return;
    }

    // Shape tools should only draw on empty canvas, not on existing nodes.
    if (['rect','circle','diamond','text'].includes(activeTool)) {
      e.stopPropagation();
      return;
    }
  }

  // ── Edge click ──
  if (eg && activeTool === 'select') {
    const edgeId = eg.getAttribute('data-id');
    const wasSelected = selection.has(edgeId);
    if (e.shiftKey) {
      if (wasSelected) selection.delete(edgeId); else selection.add(edgeId);
    } else {
      if (!wasSelected) { selection.clear(); selection.add(edgeId); }
    }
    render();
    pushHistory();
    ix.mode = 'move-node'; ix.startWX = wp.x; ix.startWY = wp.y;
    ix.wasSelected = wasSelected;
    buildSelectionDragSnapshot();
    e.stopPropagation(); return;
  }

  // ── Canvas click: shape tools ──
  if (['rect','circle','diamond','text'].includes(activeTool)) {
    ix.mode = 'draw-shape'; ix.startWX = wp.x; ix.startWY = wp.y;
    const [dw, dh] = DEFAULT_SIZE[activeTool];
    const type = activeTool;
    let shp;
    if (type === 'rect' || type === 'text') {
      shp = el('rect', { class:'rubber-band', x:wp.x, y:wp.y, width:1, height:1, rx:type==='rect'?8:4 });
    } else if (type === 'circle') {
      shp = el('ellipse', { class:'rubber-band', cx:wp.x, cy:wp.y, rx:1, ry:1 });
    } else {
      shp = el('polygon', { class:'rubber-band', points:`${wp.x},${wp.y} ${wp.x},${wp.y} ${wp.x},${wp.y} ${wp.x},${wp.y}` });
    }
    layerOverlayEl?.appendChild(shp);
    ix.preview = shp;
    return;
  }

  // ── Arrow/curve tools on empty canvas ──
  if (activeTool === 'arrow' || activeTool === 'curve') {
    ix.mode = 'draw-edge'; ix.edgeFromId = null; ix.edgeFromAnchor = null;
    ix.startSX = sp.x; ix.startSY = sp.y;
    ix.edgeX1 = wp.x; ix.edgeY1 = wp.y;
    ix.snapTarget = null;
    _startEdgePreview(wp.x, wp.y, wp.x, wp.y);
    return;
  }

  // ── Empty canvas in select mode: drag to pan canvas ──
  if (activeTool === 'select') {
    if (!e.shiftKey) { selection.clear(); render(); }
    ix.mode = 'pan';
    ix.startSX = e.clientX - vp.x;
    ix.startSY = e.clientY - vp.y;
    canvas.style.cursor = 'grabbing';
  }
});

function _startEdgePreview(x1, y1, x2, y2) {
  const p = el('path', { class:'edge-preview', d:`M ${x1},${y1} L ${x2},${y2}`,
    'marker-end':'url(#ah-preview)' });
  layerOverlayEl?.appendChild(p);
  ix.preview = p;
}

canvas.addEventListener('pointermove', e => {
  if (ix.mode === 'idle') return;
  const sp = eventToScreen(e);
  const wp = screenToWorld(sp.x, sp.y);

  if (ix.mode === 'pan') {
    vp.x = e.clientX - ix.startSX;
    vp.y = e.clientY - ix.startSY;
    updateViewport();
    return;
  }

  if (ix.mode === 'move-node') {
    const dx = wp.x - ix.startWX, dy = wp.y - ix.startWY;
    const ids = new Set();
    for (const snap of ix.multiSnap) {
      if (snap.type === 'node') {
        const n = nodes.find(n => n.id===snap.id);
        if (n) { n.x = snap.ox+dx; n.y = snap.oy+dy; renderNode(n); }
        ids.add(snap.id);
      } else if (snap.type === 'edge') {
        const ed = edges.find(e => e.id===snap.id);
        if (ed) {
          // Detach anchors when dragging edge manually
          if (ed.fromId) { ed.fromId = null; ed.fromAnchor = null; }
          if (ed.toId) { ed.toId = null; ed.toAnchor = null; }
          ed.x1 = snap.ox1 + dx;
          ed.y1 = snap.oy1 + dy;
          ed.x2 = snap.ox2 + dx;
          ed.y2 = snap.oy2 + dy;
          if (snap.ocx != null) ed.cx = snap.ocx + dx;
          if (snap.ocy != null) ed.cy = snap.ocy + dy;
          renderEdge(ed);
        }
      }
    }
    // Update connected edges
    for (const edge of edges) {
      if ((edge.fromId && ids.has(edge.fromId)) || (edge.toId && ids.has(edge.toId))) renderEdge(edge);
    }
    return;
  }

  if (ix.mode === 'resize') {
    const n = nodes.find(n => n.id===ix.nodeId);
    const o = ix.origNode;
    const dx = wp.x - ix.startWX, dy = wp.y - ix.startWY;
    const MIN = 30;
    switch(ix.corner) {
      case 'se': n.w=Math.max(MIN,o.w+dx); n.h=Math.max(MIN,o.h+dy); break;
      case 'sw': n.w=Math.max(MIN,o.w-dx); n.x=o.x+o.w-n.w; n.h=Math.max(MIN,o.h+dy); break;
      case 'ne': n.w=Math.max(MIN,o.w+dx); n.h=Math.max(MIN,o.h-dy); n.y=o.y+o.h-n.h; break;
      case 'nw': n.w=Math.max(MIN,o.w-dx); n.x=o.x+o.w-n.w; n.h=Math.max(MIN,o.h-dy); n.y=o.y+o.h-n.h; break;
    }
    renderNode(n);
    for (const edge of edges) {
      if (edge.fromId===n.id || edge.toId===n.id) renderEdge(edge);
    }
    return;
  }

  if (ix.mode === 'move-cp') {
    const edge = edges.find(e => e.id===ix.edgeId);
    if (edge) { edge.cx = wp.x; edge.cy = wp.y; renderEdge(edge); }
    return;
  }

  if (ix.mode === 'move-ep') {
    const edge = edges.find(e => e.id===ix.edgeId);
    if (!edge) return;
    // Check for snap
    const snap = findSnapAnchor(sp.x, sp.y, ix.epKey==='x1'?edge.toId:edge.fromId);
    if (snap) {
      if (ix.epKey==='x1') { edge.fromId=snap.nodeId; edge.fromAnchor=snap.anchor; }
      else                 { edge.toId  =snap.nodeId; edge.toAnchor  =snap.anchor; }
    } else {
      if (ix.epKey==='x1') { edge.fromId=null; edge.x1=wp.x; edge.y1=wp.y; }
      else                 { edge.toId  =null; edge.x2=wp.x; edge.y2=wp.y; }
    }
    renderEdge(edge);
    return;
  }

  if (ix.mode === 'draw-shape') {
    const x0=ix.startWX, y0=ix.startWY;
    const xMin=Math.min(x0,wp.x), yMin=Math.min(y0,wp.y);
    const w=Math.abs(wp.x-x0), h=Math.abs(wp.y-y0);
    const p = ix.preview;
    if (activeTool==='rect'||activeTool==='text') {
      setAttrs(p, { x:xMin, y:yMin, width:Math.max(1,w), height:Math.max(1,h) });
    } else if (activeTool==='circle') {
      setAttrs(p, { cx:xMin+w/2, cy:yMin+h/2, rx:Math.max(1,w/2), ry:Math.max(1,h/2) });
    } else {
      const pts = `${xMin+w/2},${yMin} ${xMin+w},${yMin+h/2} ${xMin+w/2},${yMin+h} ${xMin},${yMin+h/2}`;
      p.setAttribute('points', pts);
    }
    return;
  }

  if (ix.mode === 'draw-edge') {
    // Snap detection
    const snap = findSnapAnchor(sp.x, sp.y, ix.edgeFromId);
    ix.snapTarget = snap || null;

    const tx = snap ? snap.wx : wp.x;
    const ty = snap ? snap.wy : wp.y;

    // Show snap ring
    let sr = document.getElementById('snap-ring');
    if (snap) {
      if (!sr) {
        sr = el('circle', { id:'snap-ring', class:'anchor-snap', r:8 });
        layerOverlayEl?.appendChild(sr);
      }
      setAttrs(sr, { cx:snap.wx, cy:snap.wy });
    } else { sr?.remove(); }

    const x1=ix.edgeX1, y1=ix.edgeY1;
    let d;
    if (activeTool==='arrow') {
      d = `M ${x1},${y1} L ${tx},${ty}`;
    } else {
      const cp = defaultCurveCP(x1,y1,tx,ty);
      d = `M ${x1},${y1} Q ${cp.cx},${cp.cy} ${tx},${ty}`;
    }
    ix.preview?.setAttribute('d', d);
    return;
  }

  if (ix.mode === 'rubber-band') {
    const x0=ix.startWX, y0=ix.startWY;
    const xMin=Math.min(x0,wp.x), yMin=Math.min(y0,wp.y);
    const w=Math.abs(wp.x-x0), h=Math.abs(wp.y-y0);
    setAttrs(ix.preview, { x:xMin, y:yMin, width:w, height:h });
    return;
  }
});

canvas.addEventListener('pointerup', e => {
  if (e.button !== 0 && ix.mode !== 'pan') { ix.mode='idle'; return; }
  const sp = eventToScreen(e);
  const wp = screenToWorld(sp.x, sp.y);
  const mode = ix.mode;
  ix.mode = 'idle';

  if (mode === 'pan') {
    canvas.style.cursor = TOOL_CURSORS[activeTool] || 'default';
    return;
  }

  if (mode === 'move-node' || mode === 'resize') {
    if (mode === 'move-node') {
      const dx = Math.abs(wp.x - ix.startWX);
      const dy = Math.abs(wp.y - ix.startWY);
      if (dx < 2 && dy < 2 && ix.wasSelected && selection.size === 1) {
        const node = nodes.find(n => n.id === [...selection][0]);
        if (node && node.type !== 'image') { openTextEditor(node); return; }
      }
    }
    scheduleSave(); return;
  }

  if (mode === 'move-cp' || mode === 'move-ep') {
    scheduleSave(); return;
  }

  if (mode === 'draw-shape') {
    ix.preview?.remove(); ix.preview = null;
    const x0=ix.startWX, y0=ix.startWY;
    const xMin=Math.min(x0,wp.x), yMin=Math.min(y0,wp.y);
    let w=Math.abs(wp.x-x0), h=Math.abs(wp.y-y0);
    const type = activeTool;
    const [dw, dh] = DEFAULT_SIZE[type];
    pushHistory();
    let nx, ny, nw, nh;
    if (w<8 && h<8) { nw=dw; nh=dh; nx=x0-dw/2; ny=y0-dh/2; }
    else { nw=Math.max(30,w); nh=Math.max(20,h); nx=xMin; ny=yMin; }
    const node = addNode(type, nx, ny, nw, nh);
    selection.clear(); selection.add(node.id);
    render();
    if (type !== 'image') openTextEditor(node);
    setTool('select');
    return;
  }

  if (mode === 'draw-edge') {
    ix.preview?.remove(); ix.preview = null;
    document.getElementById('snap-ring')?.remove();
    const distPx = Math.hypot(sp.x - ix.startSX, sp.y - ix.startSY);
    if (distPx < 6) {
      ix.snapTarget = null;
      return;
    }
    pushHistory();
    const type = activeTool === 'curve' ? 'curved' : 'straight';
    let toId=null, toAnchor=null;
    if (ix.snapTarget) { toId=ix.snapTarget.nodeId; toAnchor=ix.snapTarget.anchor; }
    addEdge(type, ix.edgeX1, ix.edgeY1, wp.x, wp.y, ix.edgeFromId, ix.edgeFromAnchor, toId, toAnchor);
    ix.snapTarget = null;
    render();
    setTool('select');
    return;
  }

  if (mode === 'rubber-band') {
    if (ix.preview) {
      const rx=parseFloat(ix.preview.getAttribute('x'));
      const ry=parseFloat(ix.preview.getAttribute('y'));
      const rw=parseFloat(ix.preview.getAttribute('width'));
      const rh=parseFloat(ix.preview.getAttribute('height'));
      ix.preview.remove(); ix.preview = null;
      if (!e.shiftKey) selection.clear();
      for (const n of nodes) {
        if (n.x+n.w > rx && n.x < rx+rw && n.y+n.h > ry && n.y < ry+rh) selection.add(n.id);
      }
      render();
    }
    return;
  }
});

canvas.addEventListener('contextmenu', e => {

    if (!selection.has(id)) { selection.clear(); selection.add(id); render(); }
  }
  if (selection.size > 0) showCtxMenu(e.clientX, e.clientY);
});

function zoomAtScreenPoint(sx, sy, factor) {
  const newS = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, vp.s * factor));
  const af = newS / vp.s;
  vp.x = sx - (sx - vp.x) * af;
  vp.y = sy - (sy - vp.y) * af;
  vp.s = newS;
  updateViewport();
  updateStatusBar();
}

// Scroll: zoom
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const sp = eventToScreen(e);
  zoomAtScreenPoint(sp.x, sp.y, e.deltaY < 0 ? (1 + ZOOM_F) : (1 - ZOOM_F));
}, { passive: false });

// ═══════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.closest && e.target.closest('#text-editor')) return;
  if (e.target === textEditor) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  if (e.key==='Delete'||e.key==='Backspace') { e.preventDefault(); deleteSelected(); return; }
  if ((e.ctrlKey||e.metaKey) && e.key==='z') { e.preventDefault(); e.shiftKey?redo():undo(); return; }
  if ((e.ctrlKey||e.metaKey) && e.key==='y') { e.preventDefault(); redo(); return; }
  if ((e.ctrlKey||e.metaKey) && e.key==='a') { e.preventDefault();
    selection.clear(); nodes.forEach(n=>selection.add(n.id)); edges.forEach(e=>selection.add(e.id)); render(); return; }
  if ((e.ctrlKey||e.metaKey) && e.key==='d') { e.preventDefault(); duplicateSelected(); return; }
  if (e.key==='Escape') {
    ix.preview?.remove(); ix.preview=null;
    document.getElementById('snap-ring')?.remove();
    const overlay = layerOverlayEl;
    if (overlay) overlay.innerHTML='';
    ix.mode='idle'; selection.clear(); render();
    return;
  }

  // Tool shortcuts
  if (!e.ctrlKey && !e.metaKey && !e.altKey) {
    const sh = { v:'select',r:'rect',c:'circle',d:'diamond',a:'arrow',q:'curve',i:'image' };
    if (sh[e.key.toLowerCase()]) { setTool(sh[e.key.toLowerCase()]); return; }
  }

  // Nudge
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) {
    e.preventDefault();
    const step = e.shiftKey ? 10 : 1;
    const dx = e.key==='ArrowLeft'?-step:e.key==='ArrowRight'?step:0;
    const dy = e.key==='ArrowUp'?-step:e.key==='ArrowDown'?step:0;
    let changed=false;
    for (const id of selection) {
      const n=nodes.find(n=>n.id===id); if(n){n.x+=dx;n.y+=dy;changed=true;}
      const ed=edges.find(e=>e.id===id); if(ed){ed.x1+=dx;ed.y1+=dy;ed.x2+=dx;ed.y2+=dy;if(ed.cx!=null){ed.cx+=dx;ed.cy+=dy;}changed=true;}
    }
    if(changed){render();scheduleSave();}
    return;
  }

  // Zoom shortcuts
  if (e.key==='=' || e.key==='+') {
    const cx = canvas.clientWidth / 2;
    const cy = canvas.clientHeight / 2;
    zoomAtScreenPoint(cx, cy, 1.2);
  }
  if (e.key==='-') {
    const cx = canvas.clientWidth / 2;
    const cy = canvas.clientHeight / 2;
    zoomAtScreenPoint(cx, cy, 1 / 1.2);
  }
  if (e.key==='0' && (e.ctrlKey||e.metaKey)) {
    e.preventDefault(); vp.x=0; vp.y=0; vp.s=1; updateViewport(); updateStatusBar();
  }
  // Fit view
  if (e.key==='f' && !e.ctrlKey) {
    fitView();
  }
});

function fitView() {
  if (!nodes.length) return;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for (const n of nodes) {
    minX=Math.min(minX,n.x); minY=Math.min(minY,n.y);
    maxX=Math.max(maxX,n.x+n.w); maxY=Math.max(maxY,n.y+n.h);
  }
  const pad=60, r=svgRect();
  const scaleX=(r.width-pad*2)/(maxX-minX||1);
  const scaleY=(r.height-pad*2)/(maxY-minY||1);
  vp.s=Math.min(MAX_ZOOM,Math.max(MIN_ZOOM,Math.min(scaleX,scaleY)));
  vp.x=r.width/2 - (minX+(maxX-minX)/2)*vp.s;
  vp.y=r.height/2 - (minY+(maxY-minY)/2)*vp.s;
  updateViewport(); updateStatusBar();
}

function scaleImageToCanvasBounds(width, height, maxW=500, maxH=400) {
  let w = width;
  let h = height;
  if (w > maxW) { h = h * maxW / w; w = maxW; }
  if (h > maxH) { w = w * maxH / h; h = maxH; }
  return { w, h };
}

function placeImageNodeFromDataUrl(dataUrl, center, options = {}) {
  const { selectNode = false, switchToolToSelect = false, noBorder = false } = options;
  const img = new Image();
  img.onload = () => {
    const size = scaleImageToCanvasBounds(img.width, img.height);
    pushHistory();
    const imageId = generateImageId();
    storeImage(imageId, dataUrl);
    const node = addNode('image', center.x - size.w / 2, center.y - size.h / 2, size.w, size.h, {
      imageId,
      fill: 'transparent',
      noBorder
    });
    if (selectNode) {
      selection.clear();
      selection.add(node.id);
    }
    render();
    if (switchToolToSelect) setTool('select');
  };
  img.src = dataUrl;
}

// ═══════════════════════════════════════════
document.addEventListener('paste', e => {
  if (editingId) return;
  const items = e.clipboardData?.items;
  if (!items) return;

  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      const reader = new FileReader();
      reader.onload = ev => {
        const c = viewCenter();
        placeImageNodeFromDataUrl(ev.target.result, c, { selectNode: true, noBorder: true });
      };
      reader.readAsDataURL(file);
      return;
    }
  }

  // Text paste
  const text = e.clipboardData.getData('text/plain');
  if (text?.trim()) {
    e.preventDefault();
    pushHistory();
    const c = viewCenter();
    const lines = text.split('\n').slice(0,8);
    const w=Math.min(400, Math.max(160, Math.max(...lines.map(l=>l.length))*8+32));
    const h=lines.length*20+24;
    const node = addNode('rect', c.x-w/2, c.y-h/2, w, h, { text });
    selection.clear(); selection.add(node.id);
    render();
  }
});

function buildPalette() {
  const container = document.getElementById('color-palette');
  if (!container) return;
  container.innerHTML = '';
  for (const color of PALETTE) {
    const s = document.createElement('div');
    s.className = 'swatch' + (color===activeFill?' active':'');
    s.setAttribute('data-color', color);
    s.style.background = color;
    if (isLightHexColor(color)) s.style.border = '2px solid rgba(15,23,42,0.35)';
    s.title = color;
    s.addEventListener('click', () => setFill(color));
    container.appendChild(s);
  }
}

function buildBackgroundPalette() {
  const container = document.getElementById('bg-theme-palette');
  if (!container) return;
  container.innerHTML = '';
  for (const theme of BACKGROUND_THEMES) {
    const s = document.createElement('div');
    s.className = 'bg-swatch' + (theme.id===activeThemeId?' active':'');
    s.setAttribute('data-theme', theme.id);
    s.style.background = theme.preview;
    s.title = `Background: ${theme.name}`;
    s.addEventListener('click', () => applyBackgroundTheme(theme.id));
    container.appendChild(s);
  }
}

document.getElementById('tool-export').addEventListener('click', () => {
  // Force map state initialization before packaging JSON if maps is empty
  if (!maps || maps.length === 0) {
    const defaultMapId = mapUid();
    maps = [{
      id: defaultMapId,
      name: 'Map 1',
      nodes: deepClone(nodes),
      edges: deepClone(edges),
      vp: { ...vp }
    }];
    activeMapId = defaultMapId;
  } else {
    saveCurrentMap();
  }

  // Re-embed image src from imageCache so exported files are self-contained
  const _exportMaps = maps.map(m => ({
    ...m,
    nodes: m.nodes.map(n => {
      if (n.type === 'image' && n.imageId && imageCache.has(n.imageId)) {
        return { ...n, src: imageCache.get(n.imageId) };
      }
      return n;
    })
  }));
  const exportFormat = {
    type: 'BrainscapeData',
    version: 1,
    maps: _exportMaps,
    activeMapId: activeMapId,
    mapIdCtr: mapIdCtr,
    activeThemeId: activeThemeId
  };
  const data = JSON.stringify(exportFormat, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.style.display = 'none';
  a.href = url;
  a.download = `brainmap_export_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
});

document.getElementById('tool-import').addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.style.display = 'none'; // Keep it invisible
  
  // Append to body so the browser allows the file picker to open
  document.body.appendChild(input);

  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) {
      document.body.removeChild(input);
      return;
    }
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        let loadedMaps = null;
        let loadedActiveMapId = null;
        let loadedMapIdCtr = 1;
        let loadedThemeId = activeThemeId;

        // 1. New structured format
        if (d && d.type === 'BrainscapeData' && Array.isArray(d.maps)) {
          if (d.maps.length === 0) {
            alert("Warning: This file contains zero maps/nodes (empty export). Loading a blank canvas.");
            loadedMaps = [{id: 'map1', name: 'Map 1', nodes: [], edges: []}];
          } else {
            loadedMaps = d.maps;
          }
          loadedActiveMapId = d.activeMapId || loadedMaps[0].id;
          loadedMapIdCtr = d.mapIdCtr || 1;
          loadedThemeId = d.activeThemeId || loadedThemeId;
        } 
        // 2. Direct array (previous quick export)
        else if (Array.isArray(d)) {
          loadedMaps = d.length > 0 ? d : [{id: 'map1', name: 'Map 1', nodes: [], edges: []}];
          // Ensure they have ids
          if (!loadedMaps[0].id) loadedMaps[0].id = 'map1';
          loadedActiveMapId = loadedMaps[0].id;
        } 
        // 3. Raw localStorage dump ({maps, activeMapId})
        else if (d && Array.isArray(d.maps)) {
          loadedMaps = d.maps.length > 0 ? d.maps : [{id: 'map1', name: 'Map 1', nodes: [], edges: []}];
          loadedActiveMapId = d.activeMapId || loadedMaps[0].id;
          loadedMapIdCtr = d.mapIdCtr || 1;
          loadedThemeId = d.activeThemeId || loadedThemeId;
        }
        // 4. Single older format ({ nodes, edges })
        else if (d && (Array.isArray(d.nodes) || Array.isArray(d.edges))) {
          loadedMaps = [{
            id: d.id || 'map1', 
            name: d.name || 'Imported Map', 
            nodes: Array.isArray(d.nodes) ? d.nodes : [], 
            edges: Array.isArray(d.edges) ? d.edges : [], 
            vp: d.vp || {x:0, y:0, s:1}
          }];
          loadedActiveMapId = loadedMaps[0].id;
        } 
        else {
           throw new Error("Unrecognized JSON map format structure.");
        }

        // Extract inline base64 images from imported data → IndexedDB
        for (const m of loadedMaps) {
          for (const n of (m.nodes || [])) {
            if (n.type === 'image' && n.src && !n.imageId) {
              n.imageId = generateImageId();
              storeImage(n.imageId, n.src);
              delete n.src;
            }
          }
        }

        // Apply & Normalize
        maps = loadedMaps;
        activeMapId = loadedActiveMapId;
        if (!currentMap()) activeMapId = maps[0].id;
        
        mapIdCtr = Math.max(loadedMapIdCtr || 1, maps.length + 1);
        activeThemeId = loadedThemeId;
        applyBackgroundTheme(activeThemeId, true);

        const mapToLoad = currentMap();
        if (!mapToLoad) {
           throw new Error("Could not initialize map from data.");
        }
        loadMapData(mapToLoad);
        renderTabs();
        render();
        scheduleSave();
        
      } catch (err) {
        console.error("Import error:", err);
        alert('File could not be read or is not valid JSON. Error: ' + err.message);
      }
      document.body.removeChild(input);
    };
    reader.readAsText(file);
  };
  input.click();
});

canvas.addEventListener('pointerdown', e => {

}, true);

    maps = [{
      id: initialMapId,
      name: 'Map 1',
      nodes: deepClone(nodes),
      edges: deepClone(edges),
      vp: { ...vp }
    }];
    activeMapId = initialMapId;

    saveTimer = null;
    localStorage.setItem(LS_KEY, JSON.stringify({ maps, activeMapId, mapIdCtr, activeThemeId }));
  }

  // Migrate any legacy nodes that still carry inline base64 src → IndexedDB
  migrateImageNodes();

  renderTabs();
  pushHistory();
  render();
  canvas.focus();
})();
</script>
